<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CardBiz</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0d10;--surf:#141820;--surf2:#1c2028;--surf3:#242932;
  --border:#252c38;--border2:#323c4a;
  --text:#dde3ed;--dim:#8892a4;--faint:#424d5c;
  --gold:#f5c842;--gold2:#c99b1e;
  --green:#2ecc8a;--red:#e05252;--blue:#4da6ff;--purple:#a47ef5;--orange:#f5824a;
  --mono:'DM Mono',monospace;--ui:'Syne',sans-serif;
  --r:10px;--r2:7px;
}
body{background:var(--bg);color:var(--text);font-family:var(--ui);min-height:100vh;overflow-x:hidden}

/* ── LAYOUT ── */
.shell{display:flex;height:100vh;overflow:hidden}
.side{width:210px;min-width:210px;background:var(--surf);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column}

/* ── SIDEBAR ── */
.brand{padding:18px 16px 16px;border-bottom:1px solid var(--border)}
.brand-name{font-size:20px;font-weight:800;letter-spacing:-0.5px}
.brand-name em{color:var(--gold);font-style:normal}
.brand-tag{font-size:9px;font-family:var(--mono);color:var(--faint);letter-spacing:1.5px;margin-top:2px}
.nav{padding:8px 0;flex:1}
.ni{display:flex;align-items:center;gap:9px;padding:9px 16px;font-size:12.5px;font-weight:600;color:var(--dim);cursor:pointer;border-left:2px solid transparent;transition:all .12s;letter-spacing:.2px}
.ni:hover{color:var(--text);background:var(--surf2)}
.ni.on{color:var(--gold);border-left-color:var(--gold);background:rgba(245,200,66,.05)}
.ni .ic{font-size:15px;width:18px;text-align:center}
.side-foot{padding:14px 16px;border-top:1px solid var(--border);font-family:var(--mono)}
.sf-row{margin-bottom:6px}
.sf-lbl{font-size:9px;color:var(--faint);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.sf-val{font-size:13px;font-weight:500}
.sf-val.g{color:var(--green)}.sf-val.r{color:var(--red)}.sf-val.o{color:var(--gold)}

/* ── TOPBAR ── */
.topbar{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--surf);position:sticky;top:0;z-index:20}
.pg-title{font-size:17px;font-weight:700;flex:1}
.pg-sub{font-size:12px;color:var(--dim);font-family:var(--mono);margin-left:6px;font-weight:400}

/* ── CONTENT ── */
.content{padding:20px 24px;flex:1}

/* ── STAT GRID ── */
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:24px}
.sc{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;min-width:180px;overflow:hidden}
.sc-lbl{font-size:9px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;font-family:var(--mono);margin-bottom:7px}
.sc-val{font-size:18px;font-weight:800;letter-spacing:-.3px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-val.g{color:var(--green)}.sc-val.r{color:var(--red)}.sc-val.o{color:var(--gold)}.sc-val.b{color:var(--blue)}
.sc-sub{font-size:11px;color:var(--faint);margin-top:3px;font-family:var(--mono)}

/* ── FILTER BAR ── */
.fb{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.sw{position:relative;flex:1;min-width:200px}
.sw input{width:100%;background:var(--surf);border:1px solid var(--border);color:var(--text);padding:8px 10px 8px 30px;border-radius:var(--r2);font-size:12.5px;font-family:var(--ui);outline:none;transition:border .12s}
.sw input:focus{border-color:var(--gold)}
.sw .si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:13px;pointer-events:none}
select,.btn{background:var(--surf);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:var(--r2);font-size:12.5px;font-family:var(--ui);cursor:pointer;outline:none;transition:all .12s}
.btn{font-weight:600}
.btn:hover{background:var(--surf2);border-color:var(--border2)}
.btn.pri{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700}
.btn.pri:hover{background:var(--gold2)}
.btn.sm{padding:4px 9px;font-size:11px}
.btn.xs{padding:3px 7px;font-size:10px;font-family:var(--mono)}
.btn.ghost{background:transparent;border-color:var(--border);color:var(--dim)}
.btn.ghost:hover{color:var(--text);border-color:var(--border2)}
.btn.red{border-color:var(--red);color:var(--red)}
.btn.red:hover{background:rgba(224,82,82,.1)}

/* ── TABLE ── */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{text-align:left;padding:8px 10px;font-size:9px;font-family:var(--mono);letter-spacing:1px;color:var(--faint);border-bottom:1px solid var(--border);white-space:nowrap;user-select:none}
thead th.sort{cursor:pointer}
thead th.sort:hover{color:var(--text)}
tbody tr{border-bottom:1px solid var(--border);transition:background .08s}
tbody tr:hover{background:var(--surf2)}
tbody tr.highlight{background:rgba(245,200,66,.06)}
td{padding:8px 10px;vertical-align:middle}
.cic{width:46px;padding:5px 6px}
.ct{width:36px;height:50px;border-radius:4px;object-fit:cover;background:var(--surf2);display:block}
.ctp{width:36px;height:50px;background:var(--surf2);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:16px}
.cn{font-weight:600;font-size:12.5px;line-height:1.4}
.cm{font-size:10px;color:var(--dim);font-family:var(--mono);margin-top:1px}

/* ── PARSED TAGS ── */
.ptags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.pt{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:3px;font-size:9px;font-family:var(--mono);font-weight:500;letter-spacing:.3px;background:var(--surf3);border:1px solid var(--border);color:var(--dim);white-space:nowrap;min-width:max-content;height:18px;line-height:14px}
.pt.year{border-color:rgba(77,166,255,.3);color:var(--blue)}
.pt.set{border-color:rgba(164,126,245,.3);color:var(--purple)}
.pt.serial{border-color:rgba(245,200,66,.4);color:var(--gold)}
.pt.auto{border-color:rgba(245,130,74,.3);color:var(--orange)}
.pt.rc{border-color:rgba(46,204,138,.3);color:var(--green)}
.pt.grade{border-color:rgba(224,82,82,.4);color:var(--red)}
.pt.var{border-color:rgba(142,162,184,.2);color:var(--dim)}
.pt[onclick]:hover{filter:brightness(1.4);border-color:currentColor;transition:filter .1s}
.et-del{background:none;border:none;color:inherit;cursor:pointer;opacity:0.45;padding:0 0 0 2px;font-size:12px;line-height:1;flex-shrink:0;font-family:var(--mono)}
.et-del:hover{opacity:1}

/* ── TYPE BADGE ── */
.tb{display:inline-block;padding:2px 7px;border-radius:3px;font-size:9px;font-family:var(--mono);font-weight:500;letter-spacing:.5px}
.tb.soccer{background:rgba(46,204,138,.1);color:var(--green);border:1px solid rgba(46,204,138,.2)}
.tb.pokémon,.tb.pokemon{background:rgba(245,200,66,.1);color:var(--gold);border:1px solid rgba(245,200,66,.2)}
.tb.nfl{background:rgba(77,166,255,.1);color:var(--blue);border:1px solid rgba(77,166,255,.2)}
.tb.mlb{background:rgba(164,126,245,.1);color:var(--purple);border:1px solid rgba(164,126,245,.2)}
.tb.marvel{background:rgba(224,82,82,.1);color:var(--red);border:1px solid rgba(224,82,82,.2)}
.tb.nba{background:rgba(245,130,74,.1);color:var(--orange);border:1px solid rgba(245,130,74,.2)}
.tb.yu-gi-oh{background:rgba(245,200,66,.1);color:var(--gold);border:1px solid rgba(245,200,66,.2)}
.sb{display:inline-block;padding:2px 7px;border-radius:3px;font-size:9px;font-family:var(--mono);font-weight:500;letter-spacing:.3px}
.sb.sold{background:rgba(224,82,82,.1);color:var(--red);border:1px solid rgba(224,82,82,.2)}
.sb.stock{background:rgba(46,204,138,.1);color:var(--green);border:1px solid rgba(46,204,138,.2)}
.sb.linked{background:rgba(46,204,138,.1);color:var(--green)}
.sb.unlinked{background:rgba(66,77,92,.1);color:var(--faint)}
.sb.partial{background:rgba(245,130,74,.1);color:var(--orange)}

/* ── PRICE ── */
.pr{font-family:var(--mono);font-weight:500}
.pr.g{color:var(--green)}.pr.r{color:var(--red)}.pr.o{color:var(--gold)}.pr.d{color:var(--dim)}

/* ── PAGINATION ── */
.pag{display:flex;align-items:center;gap:6px;margin-top:14px;font-family:var(--mono);font-size:11px;color:var(--dim);justify-content:flex-end}
.pb{background:var(--surf);border:1px solid var(--border);color:var(--text);padding:4px 9px;border-radius:5px;cursor:pointer;font-family:var(--mono);font-size:11px}
.pb:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
.pb:disabled{opacity:.3;cursor:default}
.pb.on{background:var(--gold);color:#000;border-color:var(--gold)}

/* ── OVERLAY & PANEL ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:none;align-items:flex-start;justify-content:flex-end;padding:0}
.ov.open{display:flex}
.pn{background:var(--surf);border-left:1px solid var(--border);width:560px;max-width:100vw;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
.pn-head{padding:18px 20px 16px;border-bottom:1px solid var(--border);display:flex;gap:14px;align-items:flex-start;position:sticky;top:0;background:var(--surf);z-index:5}
.pn-img{width:70px;height:98px;border-radius:6px;object-fit:cover;background:var(--surf2);flex-shrink:0}
.pn-title{font-size:14px;font-weight:700;line-height:1.4;margin-bottom:4px}
.pn-meta{font-size:11px;color:var(--dim);font-family:var(--mono)}
.pn-close{margin-left:auto;font-size:18px;cursor:pointer;color:var(--dim);flex-shrink:0;padding:2px 6px;border-radius:4px;line-height:1}
.pn-close:hover{color:var(--text);background:var(--surf2)}
.pn-body{padding:18px 20px;flex:1}

/* ── PANEL SECTIONS ── */
.ps{margin-bottom:20px}
.ps-title{font-size:9px;letter-spacing:1px;text-transform:uppercase;font-family:var(--mono);color:var(--faint);margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.ps-title .edit-btn{font-size:9px;padding:2px 6px;color:var(--gold);background:transparent;border:1px solid rgba(245,200,66,.3);border-radius:3px;cursor:pointer;font-family:var(--mono);letter-spacing:.3px}
.ps-title .edit-btn:hover{background:rgba(245,200,66,.1)}

/* ── EDITABLE FIELDS ── */
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field-item label{font-size:9px;color:var(--faint);font-family:var(--mono);letter-spacing:.8px;text-transform:uppercase;display:block;margin-bottom:4px}
.field-val{font-size:13px;font-weight:600;min-height:20px}
.field-input{width:100%;background:var(--surf2);border:1px solid var(--border2);color:var(--text);padding:6px 8px;border-radius:5px;font-size:12px;font-family:var(--ui);outline:none;transition:border .12s}
.field-input:focus{border-color:var(--gold)}
.field-input.mono{font-family:var(--mono)}
.cb-row{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--dim)}
.cb-row input[type=checkbox]{accent-color:var(--gold);cursor:pointer}

/* ── MATCH CARDS ── */
.mc{background:var(--surf2);border:1px solid var(--border);border-radius:var(--r2);padding:10px 12px;margin-bottom:7px;display:flex;gap:10px;align-items:center;cursor:pointer;transition:border .12s}
.mc:hover{border-color:var(--border2)}
.mc.active{border-color:var(--green);background:rgba(46,204,138,.06)}
.mc.candidate{border-color:rgba(245,200,66,.2)}
.mc-img{width:34px;height:46px;border-radius:3px;object-fit:cover;background:var(--surf3);flex-shrink:0}
.mc-info{flex:1;min-width:0}
.mc-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-detail{font-size:10px;color:var(--dim);font-family:var(--mono);margin-top:2px}
.mc-score{font-family:var(--mono);font-size:10px;color:var(--faint);white-space:nowrap;text-align:right}
.mc-score.hi{color:var(--green)}.mc-score.med{color:var(--gold)}.mc-score.lo{color:var(--orange)}

/* ── LOOKUP / LISTING ── */
.lp-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.lp-c{background:var(--surf2);border:1px solid var(--border);border-radius:var(--r2);padding:10px;text-align:center}
.lp-lbl{font-size:9px;color:var(--faint);font-family:var(--mono);letter-spacing:1px;margin-bottom:4px}
.lp-val{font-size:15px;font-weight:700}
.comp-row{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--surf2);border:1px solid var(--border);border-radius:5px;margin-bottom:4px;font-size:11px}
.comp-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono);color:var(--dim)}
.comp-price{font-family:var(--mono);color:var(--green);white-space:nowrap;font-weight:500}
.comp-date{font-family:var(--mono);color:var(--faint);font-size:10px;white-space:nowrap}
.listing-out{background:#080a0c;border:1px solid var(--border);border-radius:7px;padding:12px;font-family:var(--mono);font-size:11px;line-height:1.75;white-space:pre-wrap;max-height:280px;overflow-y:auto;color:var(--text)}

/* ── SEARCH PANEL (relink) ── */
.search-results{max-height:380px;overflow-y:auto;margin-top:8px}
.sr-item{display:flex;gap:10px;align-items:center;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r2);margin-bottom:5px;cursor:pointer;transition:all .1s}
.sr-item:hover{border-color:var(--border2);background:var(--surf2)}
.sr-item.linked-item{border-color:var(--green);background:rgba(46,204,138,.06)}
.sr-img{width:30px;height:42px;border-radius:3px;object-fit:cover;background:var(--surf3);flex-shrink:0}
.sr-info{flex:1;min-width:0}
.sr-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-meta{font-size:10px;color:var(--dim);font-family:var(--mono);margin-top:1px}
.sr-actions{flex-shrink:0;display:flex;gap:5px}

/* ── BARS ── */
.bar-wrap{margin-bottom:5px}
.bar-lbl{font-size:10px;font-family:var(--mono);color:var(--dim);margin-bottom:2px;display:flex;justify-content:space-between}
.bar-track{height:5px;background:var(--surf2);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .5s}

/* ── MISC ── */
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:50px 20px;color:var(--dim)}
.empty .ei{font-size:36px;margin-bottom:10px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--surf2);border:1px solid var(--border2);border-radius:8px;padding:10px 16px;font-size:12px;z-index:9999;pointer-events:none;opacity:0;transition:opacity .2s;font-family:var(--mono)}
.toast.show{opacity:1}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--faint)}
input[type=text],input[type=number],textarea{caret-color:var(--gold)}
.sep{border:none;border-top:1px solid var(--border);margin:14px 0}
.alert{padding:10px 14px;border-radius:7px;font-size:12px;margin-bottom:12px}
.alert.warn{background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.2);color:var(--gold)}
.alert.info{background:rgba(77,166,255,.08);border:1px solid rgba(77,166,255,.2);color:var(--blue)}
.alert.err{background:rgba(224,82,82,.1);border:1px solid rgba(224,82,82,.2);color:var(--red)}
/* ── SORT HEADERS ── */
thead th.sh{cursor:pointer;user-select:none}
thead th.sh:hover{color:var(--text)}
/* ── MARKET VALUE ── */
.mkt{font-family:var(--mono);font-size:11px}
.mkt.up{color:var(--green)}.mkt.dn{color:var(--red)}.mkt.neu{color:var(--gold)}
.mkt-badge{display:inline-block;font-size:9px;font-family:var(--mono);padding:1px 5px;border-radius:3px;margin-top:2px}
.mkt-badge.stale{background:rgba(66,77,92,.2);color:var(--faint)}
.mkt-badge.fresh{background:rgba(46,204,138,.08);color:var(--green)}
/* ── IMPORT PAGE ── */
.import-drop{border:2px dashed var(--border2);border-radius:var(--r);padding:24px;text-align:center;transition:border-color .15s;cursor:pointer}
.import-drop:hover,.import-drop.drag{border-color:var(--gold);background:rgba(245,200,66,.04)}
.import-drop .di{font-size:32px;margin-bottom:8px}
.import-drop p{font-size:12px;color:var(--dim);font-family:var(--mono)}
.parse-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.parse-row{background:var(--surf2);border:1px solid var(--border);border-radius:var(--r2);padding:10px 12px;font-size:12px}
.parse-row .pr-name{font-weight:600;font-size:12px;margin-bottom:5px;word-break:break-word}
.parse-row .pr-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px}
.parse-row .pr-thumb{width:40px;height:56px;object-fit:cover;border-radius:4px;float:right;margin-left:8px}
.parse-row .pr-cost{font-family:var(--mono);color:var(--gold);font-size:11px;margin-top:4px}
.scan-btn{background:rgba(164,126,245,.1);border:1px solid rgba(164,126,245,.3);color:var(--purple);padding:3px 8px;border-radius:4px;font-size:10px;font-family:var(--mono);cursor:pointer}
.scan-btn:hover{background:rgba(164,126,245,.2)}
/* ── API KEY SETTINGS ── */
.sf-key{padding:10px 12px;border-top:1px solid var(--border);font-family:var(--mono)}
.key-input{width:100%;background:var(--surf2);border:1px solid var(--border);color:var(--text);padding:5px 7px;border-radius:4px;font-size:10px;font-family:var(--mono);outline:none}
.key-input:focus{border-color:var(--purple)}
.key-status{font-size:9px;margin-top:4px;letter-spacing:.5px}
.key-status.ok{color:var(--green)}.key-status.no{color:var(--faint)}
</style>
</head>
<body>
<div class="shell">
  <nav class="side">
    <div class="brand">
      <div class="brand-name">Card<em>Biz</em></div>
      <div class="brand-tag">TRADE TRACKER</div>
    </div>
    <div class="nav">
      <div class="ni on" id="ni-dash" onclick="nav('dash')"><span class="ic">📊</span><span>Dashboard</span></div>
      <div class="ni" id="ni-inv" onclick="nav('inv')"><span class="ic">📦</span><span>Inventory</span></div>
      <div class="ni" id="ni-buys" onclick="nav('buys')"><span class="ic">🛒</span><span>Purchases</span></div>
      <div class="ni" id="ni-sells" onclick="nav('sells')"><span class="ic">💰</span><span>Sales &amp; P&amp;L</span></div>
      <div class="ni" id="ni-imp" onclick="nav('imp')"><span class="ic">📥</span><span>Import</span></div>
    </div>
    <div class="side-foot">
      <div class="sf-row"><div class="sf-lbl">Net P&amp;L</div><div class="sf-val" id="sf-pnl">—</div></div>
      <div class="sf-row"><div class="sf-lbl">Revenue</div><div class="sf-val g" id="sf-rev">—</div></div>
      <div class="sf-row"><div class="sf-lbl">Inventory</div><div class="sf-val o" id="sf-inv">—</div></div>
    </div>
    <div class="sf-key">
      <div style="font-size:9px;color:var(--faint);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Anthropic API Key</div>
      <input class="key-input" type="password" id="api-key-input" placeholder="sk-ant-…" oninput="saveApiKey(this.value)">
      <div class="key-status" id="key-status">—</div>
    </div>
  </nav>
  <div class="main" id="main"></div>
</div>

// STATE
// ─────────────────────────────────────────────
let { purchases, sales } = APP_DATA;
let purchaseEdits = {};  // pid -> overridden fields
let saleEdits = {};      // sid -> overridden fields

function getP(pid) { return { ...purchases.find(p=>p.id===pid)||{}, ...(purchaseEdits[pid]||{}) }; }
function getS(sid) { return { ...sales.find(s=>s.id===sid)||{}, ...(saleEdits[sid]||{}) }; }
function editP(pid, fields) { purchaseEdits[pid] = {...(purchaseEdits[pid]||{}), ...fields}; updateSidebar(); }
function editS(sid, fields) { saleEdits[sid] = {...(saleEdits[sid]||{}), ...fields}; updateSidebar(); }

let page = 'dash', pgNum = {};
let sortState = { inv: {col:'date',dir:-1}, buys: {col:'date',dir:-1}, sells: {col:'date',dir:-1}, pnl: {col:'pnl',dir:1}, imp: {col:'date',dir:-1} };
// persist market lookups: pid -> {avgPrice, lowPrice, highPrice, confidence, recentSales, ts}
let valueLookups = JSON.parse(localStorage.getItem('cb_lookups')||'{}');
function persistLookups() { try { localStorage.setItem('cb_lookups', JSON.stringify(valueLookups)); } catch(e){} }
// API key
function getApiKey() { return localStorage.getItem('cb_apikey')||''; }
function saveApiKey(v) {
  localStorage.setItem('cb_apikey', v.trim());
  const el = document.getElementById('key-status');
  if(el) { el.textContent = v.trim() ? '✓ saved' : '—'; el.className = 'key-status '+(v.trim()?'ok':'no'); }
}
// init API key field
function initApiKeyField() {
  const el = document.getElementById('api-key-input');
  const k = getApiKey();
  if(el) el.value = k;
  const st = document.getElementById('key-status');
  if(st) { st.textContent = k ? '✓ saved' : 'enter key to enable AI features'; st.className = 'key-status '+(k?'ok':'no'); }
}
function setSort(key, col) {
  if (sortState[key].col === col) sortState[key].dir *= -1;
  else { sortState[key].col = col; sortState[key].dir = -1; }
  pgNum[key] = 0; render();
}
function sortIcon(key, col) {
  if (sortState[key].col !== col) return '<span style="color:var(--border);margin-left:3px">⇅</span>';
  return sortState[key].dir === -1 ? '<span style="color:var(--gold);margin-left:3px">↓</span>' : '<span style="color:var(--gold);margin-left:3px">↑</span>';
}
function applySortP(items, key) {
  const {col, dir} = sortState[key];
  return [...items].sort((a,b) => {
    let av, bv;
    if (col==='cost') { av=a.cost; bv=b.cost; }
    else if (col==='date') { av=a.date||''; bv=b.date||''; }
    else if (col==='name') { av=a.name||''; bv=b.name||''; }
    else if (col==='type') { av=a.type||''; bv=b.type||''; }
    else if (col==='player') { av=a.player||''; bv=b.player||''; }
    else if (col==='year') { av=a.year||''; bv=b.year||''; }
    else if (col==='set') { av=a.set||''; bv=b.set||''; }
    else if (col==='serial') { av=parseFloat(a.serial)||9999; bv=parseFloat(b.serial)||9999; }
    else if (col==='seller') { av=a.seller||''; bv=b.seller||''; }
    else if (col==='pnl') {
      const ssa=salesForPid(a.id); const ssb=salesForPid(b.id);
      av=ssa.reduce((x,s)=>x+getS(s.id).price*(getS(s.id).qty||1),0)-a.cost;
      bv=ssb.reduce((x,s)=>x+getS(s.id).price*(getS(s.id).qty||1),0)-b.cost;
    }
    else { av=a[col]||''; bv=b[col]||''; }
    if (typeof av==='string') return dir * av.localeCompare(bv);
    return dir * (av - bv);
  });
}
function applySortS(items, key) {
  const {col, dir} = sortState[key];
  return [...items].sort((a,b) => {
    let av, bv;
    if (col==='price') { av=a.price; bv=b.price; }
    else if (col==='date') { av=a.date||''; bv=b.date||''; }
    else if (col==='title') { av=a.title||''; bv=b.title||''; }
    else if (col==='type') { av=a.type||''; bv=b.type||''; }
    else if (col==='player') { av=a.player||''; bv=b.player||''; }
    else if (col==='year') { av=a.year||''; bv=b.year||''; }
    else if (col==='total') { av=a.price*(a.qty||1); bv=b.price*(b.qty||1); }
    else if (col==='pnl') {
      const lpa=a.linkedPid?getP(a.linkedPid):null;
      const lpb=b.linkedPid?getP(b.linkedPid):null;
      av=lpa?netProfit(a.price,a.qty||1,lpa.cost):-Infinity;
      bv=lpb?netProfit(b.price,b.qty||1,lpb.cost):-Infinity;
    }
    else if (col==='match') { av=a.linkedPid?1:0; bv=b.linkedPid?1:0; }
    else { av=a[col]||''; bv=b[col]||''; }
    if (typeof av==='string') return dir * av.localeCompare(bv);
    return dir * (av - bv);
  });
}
let filt = {
  inv:   {q:'', type:'', status:'', mkt:''},
  buys:  {q:'', type:''},
  sells: {q:'', type:'', linked:''},
  pnl:   {q:''},
  imp:   {q:''},
};
const PS = 50;

// ─────────────────────────────────────────────
// COMPUTED
// ─────────────────────────────────────────────
function soldPids() {
  const s = new Set();
  for (const sale of sales) { const lp = saleEdits[sale.id]?.linkedPid ?? sale.linkedPid; if (lp) s.add(lp); }
  return s;
}
function salesForPid(pid) { return sales.filter(s => (saleEdits[s.id]?.linkedPid ?? s.linkedPid) === pid); }
function totalRev() { return sales.reduce((a,s)=>a+getS(s.id).price*(getS(s.id).qty||1),0); }
function totalCost() { return purchases.reduce((a,p)=>a+getP(p.id).cost,0); }
function linkedPnl() {
  let r = 0;
  for (const s of sales) {
    const ss = getS(s.id); const lp = ss.linkedPid;
    if (!lp) continue;
    r += netProfit(ss.price, ss.qty||1, getP(lp).cost);
  }
  return r;
}
function invCount() { const sp = soldPids(); return purchases.filter(p=>!sp.has(p.id)).length; }
function invCost() { const sp = soldPids(); return purchases.filter(p=>!sp.has(p.id)).reduce((a,p)=>a+getP(p.id).cost,0); }

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function f$(n) { return n==null?'—':'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
// eBay fee: 13.25% on first $7500, 2.35% above — plus $0.30 fixed per order
function ebayFee(price, qty) {
  const total = price * (qty||1);
  const feePct = total <= 7500 ? total * 0.1325 : (7500*0.1325 + (total-7500)*0.0235);
  return Math.round((feePct + 0.30) * 100) / 100;
}
function netProfit(salePrice, qty, cost) {
  return (salePrice*(qty||1)) - cost - ebayFee(salePrice, qty||1);
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function typeBadge(t) {
  const cls=(t||'').toLowerCase().replace(/[éê]/g,'e').replace(/[^a-z0-9-]/g,'');
  return `<span class="tb ${cls}">${esc(t||'?')}</span>`;
}
function thumb(url,cls='ct') {
  if (url&&url.startsWith('http')) return `<img class="${cls}" src="${esc(url)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=ctp>🃏</div>'">`;
  return `<div class="ctp">🃏</div>`;
}

  if(!key)return;

}
function parsedTags(o,clickable){
  const t=[];
  const c=clickable?(v)=>` onclick="event.stopPropagation();setTagSearch('${v.replace(/'/g,'\'')}')" title="Filter by ${v}" style="cursor:pointer"`:'';
  if(o.year) t.push(`<span class="pt year"${c(o.year)}>${esc(o.year)}</span>`);
  if(o.set)  t.push(`<span class="pt set"${c(o.set)}>${esc(o.set)}</span>`);
  if(o.variation) t.push(`<span class="pt var"${c(o.variation)}>${esc(o.variation)}</span>`);
  if(o.serial)    t.push(`<span class="pt serial"${c('/'+o.serial)}>/${esc(o.serial)}</span>`);
  if(o.grade)     t.push(`<span class="pt grade"${c(o.grade)}>${esc(o.grade)}</span>`);
  if(o.is_auto)   t.push(`<span class="pt auto"${c('auto')}>AUTO</span>`);
  if(o.is_rc)     t.push(`<span class="pt rc"${c('RC')}>RC</span>`);
  return t.length?`<div class="ptags">${t.join('')}</div>`:'';
}

// RENDER ROUTING
// ─────────────────────────────────────────────
function render(){
  const m=document.getElementById('main');
  // Save focus before replacing DOM
  const ae=document.activeElement;
  const savedId=ae?.id||null;
  const savedSel0=ae?.selectionStart??null;
  const savedSel1=ae?.selectionEnd??null;
  if(page==='dash')  m.innerHTML=renderDash();
  else if(page==='inv')   m.innerHTML=renderInv();
  else if(page==='buys')  m.innerHTML=renderBuys();
  else if(page==='sells') m.innerHTML=renderSells();
  else if(page==='imp')   m.innerHTML=renderImport();
  updateSidebar();
  // Restore focus to search input if it was focused
  if(savedId){const el=document.getElementById(savedId);if(el){el.focus();try{if(savedSel0!==null)el.setSelectionRange(savedSel0,savedSel1);}catch(e){}}}
}
function renderPag(total,cur,key){
  const tp=Math.ceil(total/PS);
  if(tp<=1)return'';
  const s=cur*PS+1,e=Math.min((cur+1)*PS,total);
  const range=[];
  for(let i=0;i<tp;i++){if(i===0||i===tp-1||Math.abs(i-cur)<=2)range.push(i);else if(range[range.length-1]!=='...')range.push('...');}
  const btns=range.map(i=>i==='...'?`<span style="color:var(--faint)">…</span>`:`<button class="pb ${i===cur?'on':''}" onclick="goPage('${key}',${i})">${i+1}</button>`).join('');
  return `<div class="pag"><span>${s}–${e} of ${total}</span>
    <button class="pb" onclick="goPage('${key}',${cur-1})" ${cur===0?'disabled':''}>‹</button>
    ${btns}
    <button class="pb" onclick="goPage('${key}',${cur+1})" ${cur>=tp-1?'disabled':''}>›</button>
  </div>`;
}

function renderDash(){
  const sp=soldPids();
  const pnl=linkedPnl(),rev=totalRev(),cost=totalCost();
  const linked=sales.filter(s=>(saleEdits[s.id]?.linkedPid??s.linkedPid)).length;
  const unlinked=sales.length-linked;
  const monthly={};
  for(const s of sales){const d=getS(s.id).date||'';const m=d.slice(0,7);if(m)monthly[m]=(monthly[m]||0)+getS(s.id).price*(getS(s.id).qty||1);}
  const months=Object.keys(monthly).sort().slice(-12);
  const maxM=Math.max(...months.map(m=>monthly[m]),1);

  for(const s of sales){const ss=getS(s.id);const pl=ss.player||ss.title.split(' ').slice(0,2).join(' ');plrev[pl]=(plrev[pl]||0)+ss.price*(ss.qty||1);}
  const topPl=Object.entries(plrev).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxPl=topPl[0]?.[1]||1;
  return`
  <div class="topbar"><div class="pg-title">Dashboard</div></div>
  <div class="content">
    <div class="sg">
      <div class="sc"><div class="sc-lbl">Purchases</div><div class="sc-val o">${purchases.length.toLocaleString()}</div><div class="sc-sub">cards bought</div></div>

      <div class="sc"><div class="sc-lbl">Revenue</div><div class="sc-val g">${f$(rev)}</div><div class="sc-sub">gross</div></div>
      <div class="sc"><div class="sc-lbl">Net P&L (after fees)</div><div class="sc-val ${pnl>=0?'g':'r'}">${f$(pnl)}</div><div class="sc-sub">${linked} linked flips</div></div>
      <div class="sc"><div class="sc-lbl">Inventory</div><div class="sc-val b">${purchases.length-sp.size}</div><div class="sc-sub">${f$(invCost())} cost</div></div>
      <div class="sc"><div class="sc-lbl">Unlinked Sales</div><div class="sc-val ${unlinked>0?'r':'g'}">${unlinked}</div><div class="sc-sub">need matching</div></div>
      <div class="sc"><div class="sc-lbl">Link Rate</div><div class="sc-val">${Math.round(linked/Math.max(sales.length,1)*100)}%</div><div class="sc-sub">${linked}/${sales.length}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:20px">
      <div><div style="font-size:13px;font-weight:700;margin-bottom:10px">Monthly Revenue</div>
        <div style="background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:14px">
          ${months.map(m=>`<div class="bar-wrap"><div class="bar-lbl"><span>${m}</span><span style="color:var(--green)">${f$(monthly[m])}</span></div><div class="bar-track"><div class="bar-fill" style="width:${(monthly[m]/maxM*100).toFixed(1)}%;background:var(--green)"></div></div></div>`).join('')}
        </div>
      </div>
      <div><div style="font-size:13px;font-weight:700;margin-bottom:10px">Top Players by Revenue</div>
        <div style="background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:14px">
          ${topPl.map(([pl,rv])=>`<div class="bar-wrap"><div class="bar-lbl"><span>${esc(pl)}</span><span style="color:var(--gold)">${f$(rv)}</span></div><div class="bar-track"><div class="bar-fill" style="width:${(rv/maxPl*100).toFixed(1)}%;background:var(--gold)"></div></div></div>`).join('')}

function renderInv(){
  const sp=soldPids();
  const f=filt.inv;
  let items=purchases.filter(p=>!sp.has(p.id)).map(p=>getP(p.id));
  if(f.q){const q=f.q.toLowerCase();items=items.filter(p=>p.name.toLowerCase().includes(q)||(p.player||'').toLowerCase().includes(q)||(p.set||'').toLowerCase().includes(q));}
  if(f.type) items=items.filter(p=>p.type===f.type);
  if(f.mkt==='yes') items=items.filter(p=>valueLookups[p.id]);
  if(f.mkt==='no')  items=items.filter(p=>!valueLookups[p.id]);

// ─────────────────────────────────────────────
// P&L FLIPS
// ─────────────────────────────────────────────
function renderPnl(){
  const f=filt.pnl;
  const flips=[];
  for(const s of sales){
    const ss=getS(s.id);if(!ss.linkedPid)continue;
    const pp=getP(ss.linkedPid);
    const rev=ss.price*(ss.qty||1);
    flips.push({sale:ss,purchase:pp,rev,pnl:rev-pp.cost});
  }
  // Compute net profit for each flip
  for(const fl of flips){fl.fee=ebayFee(fl.sale.price,fl.sale.qty||1);fl.netPnl=fl.rev-fl.purchase.cost-fl.fee;}
  let items=flips;
  if(f.q){const q=f.q.toLowerCase();items=items.filter(f=>f.sale.title.toLowerCase().includes(q)||f.purchase.name.toLowerCase().includes(q)||(f.sale.player||'').toLowerCase().includes(q));}
  const sk=sortState.pnl; items=[...items].sort((a,b)=>{
    let av,bv;
    if(sk.col==='pnl'){av=a.netPnl;bv=b.netPnl;}
    else if(sk.col==='cost'){av=a.purchase.cost;bv=b.purchase.cost;}
    else if(sk.col==='rev'){av=a.rev;bv=b.rev;}
    else if(sk.col==='roi'){av=a.purchase.cost>0?a.netPnl/a.purchase.cost:0;bv=b.purchase.cost>0?b.netPnl/b.purchase.cost:0;}
    else if(sk.col==='date'){av=a.sale.date||'';bv=b.sale.date||'';}
    else if(sk.col==='player'){av=a.purchase.player||'';bv=b.purchase.player||'';}
    else{av=Math.abs(b.netPnl);bv=Math.abs(a.netPnl);}
    if(typeof av==='string')return sk.dir*av.localeCompare(bv);
    return sk.dir*(av-bv);
  });
  const pn=pgNum.pnl||0,total=items.length;
  const page_items=items.slice(pn*PS,(pn+1)*PS);
  const allNetPnl=flips.reduce((a,f)=>a+(f.netPnl||0),0);
  const winners=flips.filter(f=>(f.netPnl||0)>0),losers=flips.filter(f=>(f.netPnl||0)<=0);
  return`
  <div class="topbar"><div class="pg-title">P&L Flips <span class="pg-sub">${total} matched pairs</span></div></div>
  <div class="content">
    <div class="sg" style="margin-bottom:16px">
      <div class="sc"><div class="sc-lbl">Net P&L (after fees)</div><div class="sc-val ${allNetPnl>=0?'g':'r'}">${f$(allNetPnl)}</div><div class="sc-sub">matched flips</div></div>
      <div class="sc"><div class="sc-lbl">Winners</div><div class="sc-val g">${winners.length}</div><div class="sc-sub">${f$(winners.reduce((a,f)=>a+(f.netPnl||0),0))} net</div></div>
      <div class="sc"><div class="sc-lbl">Losers</div><div class="sc-val r">${losers.length}</div><div class="sc-sub">${f$(losers.reduce((a,f)=>a+(f.netPnl||0),0))} net</div></div>
      <div class="sc"><div class="sc-lbl">Win Rate</div><div class="sc-val">${total?Math.round(winners.length/total*100):0}%</div><div class="sc-sub">${total} flips</div></div>
    </div>
    <div class="fb"><div class="sw"><span class="si">🔍</span><input value="${esc(f.q)}" placeholder="Search flips…" oninput="filt.pnl.q=this.value;pgNum.pnl=0;render()"></div></div>
    <div class="tw"><table>
      <thead><tr><th></th>
        <th onclick="setSort('pnl','player')" class="sh">PURCHASE → SALE${sortIcon('pnl','player')}</th>
        <th>PARSED</th>
        <th onclick="setSort('pnl','cost')" class="sh">COST${sortIcon('pnl','cost')}</th>
        <th onclick="setSort('pnl','rev')" class="sh">REVENUE${sortIcon('pnl','rev')}</th>
        <th onclick="setSort('pnl','pnl')" class="sh">NET P&L${sortIcon('pnl','pnl')}</th>
        <th onclick="setSort('pnl','roi')" class="sh">ROI${sortIcon('pnl','roi')}</th>
      </tr></thead>
      <tbody>${page_items.map(({sale:ss,purchase:pp,rev,pnl,netPnl,fee})=>{
        const roi=pp.cost>0?((netPnl/pp.cost)*100).toFixed(0)+'%':'—';
        return`<tr onclick="showSale('${ss.id}')" style="cursor:pointer">
          <td class="cic">${thumb(pp.img)}</td>
          <td><div class="cn">${esc(pp.name)}</div><div class="cm">→ ${esc(ss.title)}</div><div class="cm">${esc(pp.date)} · sold ${esc(ss.date)}</div></td>
          <td>${parsedTags(pp,true)}</td>
          <td><span class="pr o">${f$(pp.cost)}</span></td>
          <td><span class="pr g">${f$(rev)}</span></td>
          <td><span class="pr ${netPnl>=0?'g':'r'}" style="font-weight:700">${f$(netPnl)}</span><div style="font-size:9px;color:var(--faint);font-family:var(--mono)">fee ${f$(fee)}</div></td>
          <td><span class="pr ${netPnl>=0?'g':'r'}">${roi}</span></td>
        </tr>`;}).join('')}
      </tbody>
    </table></div>
    ${renderPag(total,pn,'pnl')}
  </div>`;
}

function openRelinkPanel(sid){
  const s=getS(sid);
  const cands=(sales.find(x=>x.id===sid)?.candidates||[]);
  openPanel(`
    <div class="pn-head">
      <div style="flex:1;min-width:0">
        <div class="pn-title">Link Purchase to Sale</div>
        <div class="pn-meta">${esc(s.title)}</div>
        <div style="margin-top:4px">${parsedTags(s)}</div>
      </div>
      <button class="btn ghost sm" style="margin-right:6px;flex-shrink:0" onclick="showSale('${sid}')">← Back to Sale</button>
      <button class="pn-close" onclick="closePanel()">✕</button>
    </div>
    <div class="pn-body">
      <div class="ps">
        <div class="ps-title">Current Link</div>
        ${s.linkedPid?`<div class="mc active" style="margin-bottom:8px">
          ${getP(s.linkedPid)?.img?`<img class="mc-img" src="${esc(getP(s.linkedPid).img)}" onerror="this.style.display='none'">` :''}
          <div class="mc-info"><div class="mc-name">${esc(getP(s.linkedPid)?.name||'')}</div></div>
          <button class="btn xs red" onclick="unlinkSale('${sid}');openRelinkPanel('${sid}')">Remove</button>
        </div>`:`<div style="color:var(--faint);font-size:12px;font-family:var(--mono)">No purchase linked.</div>`}
      </div>
      ${cands.length?`<div class="ps"><div class="ps-title">Top Candidates</div>
        ${cands.map(c=>{const cp=getP(c.pid);if(!cp?.name)return'';const isL=s.linkedPid===c.pid;
          return`<div class="mc ${isL?'active':'candidate'}">
            ${cp.img?`<img class="mc-img" src="${esc(cp.img)}" onerror="this.style.display='none'">` :''}
            <div class="mc-info"><div class="mc-name">${esc(cp.name)}</div>
            <div class="mc-detail">${esc(cp.date)} · ${f$(cp.cost)}</div>${parsedTags(cp)}</div>
            <div style="text-align:right;flex-shrink:0">
              <div class="mc-score ${scoreClass(c.score)}">${scoreLabel(c.score)}</div>
              ${!isL?`<button class="btn xs" style="margin-top:4px" onclick="linkSale('${sid}','${c.pid}');openRelinkPanel('${sid}')">Link</button>`:`<span style="font-size:10px;color:var(--green)">✓ linked</span>`}
            </div>
          </div>`;}).join('')}
      </div>`:''}
      <div class="ps">
        <div class="ps-title">Search All Purchases</div>
        <div class="fb" style="margin-bottom:8px">
          <div class="sw" style="flex:1"><span class="si">🔍</span>
            <input id="relink-q" placeholder="Player name, set, year…" oninput="renderRelinkResults('${sid}',this.value)">
          </div>
        </div>
        <div id="relink-results"></div>
      </div>
    </div>
  `);
  const qEl=document.getElementById('relink-q');
  if(qEl){qEl.value=s.player||'';renderRelinkResults(sid,qEl.value);}
}

function renderRelinkResults(sid,q){
  const el=document.getElementById('relink-results');
  if(el)el.innerHTML=renderRelinkResultsHtml(sid,q);
}
function renderRelinkResultsHtml(sid,q){
  const s=getS(sid);
  const qq=(q||'').toLowerCase().trim();
  if(!qq)return`<div style="color:var(--faint);font-size:12px;font-family:var(--mono)">Type to search…</div>`;
  const results=purchases.filter(p=>{
    const pp=getP(p.id);
    return pp.name.toLowerCase().includes(qq)||(pp.player||'').toLowerCase().includes(qq)||
           (pp.set||'').toLowerCase().includes(qq)||(pp.year||'').includes(qq);
  }).slice(0,25);
  if(!results.length)return`<div style="color:var(--faint);font-size:12px;font-family:var(--mono)">No purchases found</div>`;
  return results.map(p=>{const pp=getP(p.id);const isL=s.linkedPid===p.id;
    return`<div class="sr-item ${isL?'linked-item':''}">
      ${pp.img?`<img class="sr-img" src="${esc(pp.img)}" onerror="this.style.display='none'">`:`<div class="sr-img" style="display:flex;align-items:center;justify-content:center;font-size:14px">🃏</div>`}
      <div class="sr-info"><div class="sr-name">${esc(pp.name)}</div>
      <div class="sr-meta">${esc(pp.date)} · ${f$(pp.cost)} · ${esc(pp.seller)}</div>${parsedTags(pp)}</div>

function etDel(type,id,field){
  const blank=(field==='is_auto'||field==='is_rc')?false:'';
  if(type==='p'){editP(id,{[field]:blank});_panelEditMode={};openPanel(buildPurchasePanel(id));}
  else{editS(id,{[field]:blank});_salePanelEdit={};openPanel(buildSalePanel(id));}
}
function etEdit(spanEl,type,id,field){
  const chipEl=spanEl.parentElement;
  const raw=spanEl.dataset.raw||spanEl.textContent;
  spanEl.style.display='none';
  const inp=document.createElement('input');
  inp.value=raw;
  inp.style.cssText='background:transparent;border:none;border-bottom:1px solid currentColor;color:inherit;font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:.3px;outline:none;padding:0;min-width:30px;max-width:120px';
  inp.size=Math.max(4,raw.length);
  chipEl.insertBefore(inp,spanEl);
  inp.focus();inp.select();
  let done=false;
  function save(){
    if(done)return;done=true;
    const v=inp.value.trim().replace(/^\/+/,'');
    if(type==='p'){editP(id,{[field]:v});_panelEditMode={};openPanel(buildPurchasePanel(id));}
    else{editS(id,{[field]:v});_salePanelEdit={};openPanel(buildSalePanel(id));}
  }
  inp.addEventListener('blur',save);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();inp.blur();}if(e.key==='Escape'){done=true;spanEl.style.display='';inp.remove();}});
}
function editableTags(type,id,o){
  const chip=(cls,field,display,raw)=>`<span class="pt ${cls}" style="gap:2px"><span class="et-text" data-raw="${esc(raw)}" onclick="etEdit(this,'${type}','${id}','${field}')" style="cursor:pointer" title="Click to edit">${esc(display)}</span><button class="et-del" onclick="event.stopPropagation();etDel('${type}','${id}','${field}')" title="Remove">×</button></span>`;
  const tt=[];
  if(o.year)      tt.push(chip('year','year',o.year,o.year));
  if(o.set)       tt.push(chip('set','set',o.set,o.set));
  if(o.variation) tt.push(chip('var','variation',o.variation,o.variation));
  if(o.serial)    tt.push(chip('serial','serial','/'+o.serial,o.serial));
  if(o.grade)     tt.push(chip('grade','grade',o.grade,o.grade));
  if(o.is_auto)   tt.push(`<span class="pt auto" style="gap:2px">AUTO<button class="et-del" onclick="event.stopPropagation();etDel('${type}','${id}','is_auto')" title="Remove">×</button></span>`);
  if(o.is_rc)     tt.push(`<span class="pt rc" style="gap:2px">RC<button class="et-del" onclick="event.stopPropagation();etDel('${type}','${id}','is_rc')" title="Remove">×</button></span>`);
  if(!tt.length)return`<span style="color:var(--faint);font-size:11px;font-family:var(--mono)">No tags — click "Edit Tags" to add</span>`;
  return`<div class="ptags">${tt.join('')}</div>`;
}

// CARD TITLE PARSER
// ─────────────────────────────────────────────
function parseCardTitle(title) {
  const t = title || '';
  const out = { name:t, player:'', year:'', brand:'', set:'', variation:'', serial:'', grade:'', is_auto:false, is_rc:false, is_lot:false, lotQty:1, type:'', comp:'' };

  // Year: 4-digit starting with 19xx/20xx, optionally followed by -xx or -xxxx
  const yearM = t.match(/\b((?:19|20)\d{2})(?:-(\d{2,4}))?\b/);
  if(yearM) out.year = yearM[2] ? `${yearM[1]}-${yearM[2].length===2?yearM[1].slice(0,2)+yearM[2]:yearM[2]}` : yearM[1];

  // Serial number: /N or #N/N or N/N — but NOT year ranges like 2024/25 or 24/25
  const tNoYearSlash = t.replace(/\b(?:19|20)\d{2}\/\d{2,4}\b/g, ' ').replace(/\b\d{2}\/\d{2}\b(?=\s|$)/g, ' ');
  const serialM = tNoYearSlash.match(/(?:^|\s)#?\d*\s*\/(\d+)\b/) || tNoYearSlash.match(/\b(\d+)\/(\d+)\b/);
  if(serialM) out.serial = serialM[1]==='1'&&serialM[2]?serialM[2]:serialM[1];

  // Grade
  const gradeM = t.match(/\b(PSA|BGS|SGC|CGC|BVG)\s*(\d+(?:\.\d+)?)\b/i);
  if(gradeM) out.grade = gradeM[1].toUpperCase()+gradeM[2];

  // Auto / RC flags
  if(/\b(auto|autograph|signed)\b/i.test(t)) out.is_auto=true;
  if(/\b(RC|rookie card|rookie)\b/i.test(t)) out.is_rc=true;
  if(/\b(lot|bundle|collection)\b/i.test(t)) out.is_lot=true;

  // Brand detection
  const brands=[['Panini','Panini'],['Topps','Topps'],['Upper Deck','Upper Deck'],['Donruss','Donruss'],['Bowman','Bowman'],['Fleer','Fleer'],['Score','Score'],['Select','Panini']];
  for(const [kw,br] of brands){if(t.toLowerCase().includes(kw.toLowerCase())){out.brand=br;break;}}

  // Set detection (after brand match)
  const sets=[['Prizm','Prizm'],['Chrome','Chrome'],['Optic','Optic'],['Mosaic','Mosaic'],['Obsidian','Obsidian'],['National Treasures','National Treasures'],['Contenders','Contenders'],['Select','Select'],['Revolution','Revolution'],['Immaculate','Immaculate'],['Finest','Finest'],['Sapphire','Sapphire'],['Heritage','Heritage'],['Stadium Club','Stadium Club'],['Inception','Inception'],['Certified','Certified'],['Elements','Elements'],['Spectra','Spectra']];
  for(const [kw,sn] of sets){if(t.toLowerCase().includes(kw.toLowerCase())){out.set=sn;break;}}

  // Variation/parallel detection — order matters (more specific first)
  const vars=[
    [/\bBlack\s+Finite\b/i,'Black Finite'],[/\bBlack\s+Gold\b/i,'Black Gold'],
    [/\bGold\s+Vinyl\b/i,'Gold Vinyl'],[/\bGold\s+Prizm\b/i,'Gold Prizm'],[/\bGold\s+Refractor\b/i,'Gold Refractor'],
    [/\bSilver\s+Prizm\b/i,'Silver Prizm'],[/\bRainbow\s+Prizm\b/i,'Rainbow Prizm'],
    [/\bRed\s+Wave\b/i,'Red Wave'],[/\bRed\s+Scope\b/i,'Red Scope'],[/\bRed\s+Ice\b/i,'Red Ice'],[/\bRed\s+Prizm\b/i,'Red Prizm'],
    [/\bBlue\s+Wave\b/i,'Blue Wave'],[/\bBlue\s+Prizm\b/i,'Blue Prizm'],
    [/\bHolo\s+Gold\b/i,'Holo Gold'],[/\bHolo\s+Silver\b/i,'Holo Silver'],
    [/\bSuperFractor\b/i,'Superfractor'],[/\bRefractor\b/i,'Refractor'],
    [/\bSapphire\b/i,'Sapphire'],[/\bAqua\b/i,'Aqua'],[/\bOrange\b/i,'Orange'],
    [/\bPurple\b/i,'Purple'],[/\bGreen\b/i,'Green'],[/\bPink\b/i,'Pink'],
    [/\bCamo\b/i,'Camo'],[/\bWhite\s+Sparkle\b/i,'White Sparkle'],[/\bSparkle\b/i,'Sparkle'],
    [/\bXRC\b/i,'XRC'],[/\bHolo\b/i,'Holo'],[/\bGold\b/i,'Gold'],[/\bSilver\b/i,'Silver'],
    [/\bPrizm\b/i,'Base Prizm'],[/\bSIR\b/,'Special Illustration Rare'],[/\bSAR\b/,'Special Art Rare'],
    [/\bFull\s+Art\b/i,'Full Art'],[/\bIllustration\s+Rare\b/i,'Illustration Rare'],
    [/\bex\b/,'ex'],[/\bVmax\b/i,'VMAX'],[/\bVstar\b/i,'VSTAR'],
  ];
  for(const [rx,vn] of vars){if(rx.test(t)){out.variation=vn;break;}}

  // Sport/type detection
  if(/\b(Premier League|La Liga|Bundesliga|MLS|NWSL|FIFA|soccer|football club)\b/i.test(t)||/\b(CWC|UCL|EPL|PL|MLS)\b/.test(t)) out.type='Soccer';
  else if(/\b(Pokemon|Pokémon|TCG|Pikachu|Charizard|Mewtwo|Destined Rivals|Scarlet|Violet|Paldea)\b/i.test(t)) out.type='Pokémon';
  else if(/\b(NFL|football|quarterback|touchdown|Super Bowl|NFC|AFC)\b/i.test(t)&&!/soccer/i.test(t)) out.type='NFL';
  else if(/\b(MLB|baseball|pitcher|batting|World Series|ALDS|NLCS)\b/i.test(t)) out.type='MLB';
  else if(/\b(NBA|basketball|dunk|three-point|Finals)\b/i.test(t)) out.type='NBA';
  else if(/\b(Marvel|Spider-Man|Iron Man|Avengers|X-Men|Captain)\b/i.test(t)) out.type='Marvel';
  else if(/\b(Yu-Gi-Oh|Yugioh|Duel Monsters)\b/i.test(t)) out.type='Yu-Gi-Oh';

  return out;
}

async function scanCardImage(imgUrl, pid) {
  const apiKey = getApiKey();
  if(!apiKey) { toast('Enter API key in sidebar first'); return; }
  if(!imgUrl || !imgUrl.startsWith('http')) { toast('No image URL to scan'); return; }
  toast('Scanning image…');
  const prompt = `This is a trading card image. Extract ALL visible information and return ONLY valid JSON:
{"player":"","year":"","brand":"","set":"","variation":"","serial":"","grade":"","is_auto":false,"is_rc":false,"type":"","comp":"","notes":""}

Rules:
- player: the subject/player name printed on the card
- year: the card year (4 digits, or YYYY-YY)
- brand: Panini, Topps, Upper Deck, etc.
- set: Prizm, Chrome, Finest, etc.
- variation: EXACT parallel name visible (Gold Prizm, Silver, Refractor, Holo, etc.) — be very specific
- serial: print run number only (e.g. if card says 23/99, return "99"; if 1/1, return "1")
- grade: grading slab text if visible (e.g. PSA 10, BGS 9.5)
- is_auto: true if signature visible
- is_rc: true if RC or Rookie Card logo visible
- type: Soccer, Pokémon, NFL, MLB, NBA, Marvel, Yu-Gi-Oh, or Other
- comp: competition/league shorthand (PL, CWC, UCL, etc.)
- notes: any other notable info`;
  try {
    // Fetch image as base64 if from ebayimg (cross-origin may fail, use url type instead)
    const imgContent = imgUrl.includes('ebayimg.com') || imgUrl.includes('tcgplayer.com')
      ? {type:'image',source:{type:'url',url:imgUrl}}
      : {type:'image',source:{type:'url',url:imgUrl}};
    const res = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-opus-4-5',max_tokens:800,
        messages:[{role:'user',content:[imgContent,{type:'text',text:prompt}]}]})});
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error((e.error?.message)||'API '+res.status);}
    const data = await res.json();
    const text = data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    const json = JSON.parse(text.replace(/```json|```/g,'').trim());
    // Merge into purchase
    editP(pid, {
      player:    json.player    || '',
      year:      json.year      || '',
      brand:     json.brand     || '',
      set:       json.set       || '',
      variation: json.variation || '',
      serial:    json.serial    || '',
      grade:     json.grade     || '',
      is_auto:   !!json.is_auto,
      is_rc:     !!json.is_rc,
      type:      json.type      || '',
      comp:      json.comp      || '',
    });
    toast('Image scanned — fields updated ✓');
    document.getElementById('pn').innerHTML = buildPurchasePanel(pid);
    render();
  } catch(e) {
    toast('Scan failed: ' + e.message);
  }
}

        </div>
      </div>

      <!-- IMAGE SCAN (single card) -->
      <div>
        <div style="font-size:13px;font-weight:700;margin-bottom:8px">Scan a Card Image</div>
        <div style="font-size:11px;color:var(--dim);font-family:var(--mono);margin-bottom:8px">Paste an image URL to auto-extract card details using AI vision.</div>
        <input id="scan-url" style="width:100%;background:var(--surf2);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:var(--r2);font-size:11px;font-family:var(--mono);outline:none;margin-bottom:8px" placeholder="https://i.ebayimg.com/…">
        <div style="margin-bottom:8px">
          <img id="scan-preview" src="" style="max-width:100%;max-height:160px;border-radius:6px;display:none;object-fit:contain">
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn sm" style="background:rgba(164,126,245,.1);border-color:rgba(164,126,245,.3);color:var(--purple)" onclick="previewScanImage()">👁 Preview</button>
          <button class="btn sm" style="background:rgba(164,126,245,.1);border-color:rgba(164,126,245,.3);color:var(--purple)" onclick="runStandaloneScan()">🔍 Scan & Parse</button>
        </div>
        <div id="scan-result" style="margin-top:10px"></div>
      </div>
    </div>

    <!-- PARSED RESULTS -->
    <div id="import-results">
      ${_importRows.length ? renderImportResults() : `<div class="empty"><div class="ei">📥</div><div>Paste card titles above and click Parse to begin</div></div>`}
    </div>
  </div>`;
}

function previewScanImage() {
  const url = document.getElementById('scan-url')?.value?.trim();
  const img = document.getElementById('scan-preview');
  if(!img||!url) return;
  img.src = url; img.style.display = 'block';
  img.onerror = () => { img.style.display='none'; toast('Could not load image'); };
}

async function runStandaloneScan() {
  const url = document.getElementById('scan-url')?.value?.trim();
  const apiKey = getApiKey();
  if(!apiKey){toast('Enter API key in sidebar');return;}
  if(!url){toast('Enter an image URL');return;}
  const resEl = document.getElementById('scan-result');
  if(resEl) resEl.innerHTML=`<div style="font-size:11px;font-family:var(--mono);color:var(--dim)">Scanning…</div>`;
  const prompt=`This is a trading card image. Extract ALL visible information and return ONLY valid JSON:
{"player":"","year":"","brand":"","set":"","variation":"","serial":"","grade":"","is_auto":false,"is_rc":false,"type":"","comp":""}
variation: be very specific about the exact parallel (Gold Prizm, Silver Prizm, Refractor, Holo, etc.). serial: print run denominator only (e.g. card says 5/25, return "25"). type: Soccer/Pokémon/NFL/MLB/NBA/Marvel/Yu-Gi-Oh/Other.`;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-opus-4-5',max_tokens:600,
        messages:[{role:'user',content:[{type:'image',source:{type:'url',url}},{type:'text',text:prompt}]}]})});
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error((e.error?.message)||'API '+res.status);}
    const data = await res.json();
    const text = data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    const json = JSON.parse(text.replace(/```json|```/g,'').trim());
    if(resEl) resEl.innerHTML=`<div style="background:var(--surf2);border:1px solid var(--border);border-radius:var(--r2);padding:10px;font-size:11px;font-family:var(--mono)">
      ${Object.entries(json).filter(([,v])=>v&&v!==false).map(([k,v])=>`<div><span style="color:var(--faint)">${k}:</span> <span style="color:var(--text)">${v}</span></div>`).join('')}
    </div>`;
    toast('Scan complete ✓');
  } catch(e) {
    if(resEl) resEl.innerHTML=`<div class="alert err">Scan failed: ${esc(e.message)}</div>`;
  }
}

function runImportParse() {
  const raw = document.getElementById('import-text')?.value || '';
  const lines = raw.split('\n').map(l=>l.trim()).filter(l=>l.length>5);
  _importRows = lines.map((line, i) => {
    // Try to extract price from end of line: $12.50 or 12.50
    const priceM = line.match(/\$?([\d,]+\.?\d*)\s*$/);
    const costRaw = priceM ? parseFloat(priceM[1].replace(',','')) : 0;
    const cleanTitle = priceM ? line.slice(0, line.lastIndexOf(priceM[0])).trim() : line;
    const parsed = parseCardTitle(cleanTitle);
    return { _id:'IMP'+i, ...parsed, name:cleanTitle, cost:costRaw, costRaw, img:'', seller:'', orderNum:'', date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}), _confirmed:false };
  });
  // Re-render the import page to show results
  document.getElementById('import-results').innerHTML = _importRows.length ? renderImportResults() : '<div style="color:var(--faint);font-size:12px;font-family:var(--mono)">No valid lines found</div>';
  toast(`Parsed ${_importRows.length} card${_importRows.length===1?'':'s'}`);
}

function renderImportResults() {
  if(!_importRows.length) return '';
  const confirmed = _importRows.filter(r=>r._confirmed).length;
  return`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <div style="font-size:13px;font-weight:700">Parsed Cards (${_importRows.length})</div>
      <span style="font-size:11px;font-family:var(--mono);color:var(--dim)">${confirmed} confirmed</span>
      <button class="btn pri sm" style="margin-left:auto" onclick="confirmAllImport()">✓ Add All to Purchases</button>
    </div>
    <div style="display:grid;gap:8px">
      ${_importRows.map((r,i)=>`
      <div style="background:var(--surf);border:1px solid ${r._confirmed?'var(--green)':'var(--border)'};border-radius:var(--r);padding:12px;opacity:${r._confirmed?'.6':'1'}">
        <div style="display:flex;gap:10px;align-items:flex-start">
          ${r.img?`<img src="${esc(r.img)}" style="width:40px;height:56px;object-fit:cover;border-radius:4px;flex-shrink:0" onerror="this.style.display='none'">`:'<div style="width:40px;flex-shrink:0"></div>'}
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:12px;margin-bottom:4px;word-break:break-word">${esc(r.name)}</div>
            <div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px">
              ${r.type?`<span class="tb ${(r.type||'').toLowerCase().replace(/[^a-z0-9-]/g,'')}">${esc(r.type)}</span>`:''}
              ${r.year?`<span class="pt year">${esc(r.year)}</span>`:''}
              ${r.set?`<span class="pt set">${esc(r.set)}</span>`:''}
              ${r.variation?`<span class="pt var">${esc(r.variation)}</span>`:''}
              ${r.serial?`<span class="pt serial">/${esc(r.serial)}</span>`:''}
              ${r.grade?`<span class="pt grade">${esc(r.grade)}</span>`:''}
              ${r.is_auto?`<span class="pt auto">AUTO</span>`:''}
              ${r.is_rc?`<span class="pt rc">RC</span>`:''}
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">
              <div><label style="font-size:9px;color:var(--faint);font-family:var(--mono);text-transform:uppercase;display:block;margin-bottom:2px">Player</label>
                <input style="width:100%;background:var(--surf2);border:1px solid var(--border);color:var(--text);padding:4px 6px;border-radius:4px;font-size:11px;font-family:var(--mono);outline:none" value="${esc(r.player||'')}" oninput="_importRows[${i}].player=this.value"></div>
              <div><label style="font-size:9px;color:var(--faint);font-family:var(--mono);text-transform:uppercase;display:block;margin-bottom:2px">Cost ($)</label>
                <input type="number" step="0.01" style="width:100%;background:var(--surf2);border:1px solid var(--border);color:var(--text);padding:4px 6px;border-radius:4px;font-size:11px;font-family:var(--mono);outline:none" value="${r.cost||0}" oninput="_importRows[${i}].cost=parseFloat(this.value)||0"></div>
              <div><label style="font-size:9px;color:var(--faint);font-family:var(--mono);text-transform:uppercase;display:block;margin-bottom:2px">Variation</label>
                <input style="width:100%;background:var(--surf2);border:1px solid var(--border);color:var(--text);padding:4px 6px;border-radius:4px;font-size:11px;font-family:var(--mono);outline:none" value="${esc(r.variation||'')}" oninput="_importRows[${i}].variation=this.value"></div>
              <div><label style="font-size:9px;color:var(--faint);font-family:var(--mono);text-transform:uppercase;display:block;margin-bottom:2px">Image URL</label>
                <input style="width:100%;background:var(--surf2);border:1px solid var(--border);color:var(--text);padding:4px 6px;border-radius:4px;font-size:11px;font-family:var(--mono);outline:none" value="${esc(r.img||'')}" oninput="_importRows[${i}].img=this.value" placeholder="https://i.ebayimg.com/…"></div>
              <div><label style="font-size:9px;color:var(--faint);font-family:var(--mono);text-transform:uppercase;display:block;margin-bottom:2px">Date</label>
                <input style="width:100%;background:var(--surf2);border:1px solid var(--border);color:var(--text);padding:4px 6px;border-radius:4px;font-size:11px;font-family:var(--mono);outline:none" value="${esc(r.date||'')}" oninput="_importRows[${i}].date=this.value"></div>
              <div><label style="font-size:9px;color:var(--faint);font-family:var(--mono);text-transform:uppercase;display:block;margin-bottom:2px">Seller</label>
                <input style="width:100%;background:var(--surf2);border:1px solid var(--border);color:var(--text);padding:4px 6px;border-radius:4px;font-size:11px;font-family:var(--mono);outline:none" value="${esc(r.seller||'')}" oninput="_importRows[${i}].seller=this.value"></div>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0">
            <button class="btn xs" ${r._confirmed?'disabled':''} onclick="confirmImportRow(${i})">${r._confirmed?'✓ Added':'+ Add'}</button>
            <button class="btn xs red" onclick="_importRows.splice(${i},1);document.getElementById('import-results').innerHTML=renderImportResults()">✕</button>
          </div>
        </div>
      </div>`).join('')}
    </div>`;
}

function confirmImportRow(i) {
  const r = _importRows[i];
  if(!r||r._confirmed) return;
  const newId = 'P' + String(Date.now()).slice(-6) + i;
  purchases.push({
    id:newId, name:r.name, date:r.date||'', cost:r.cost||0, costRaw:r.costRaw||r.cost||0,
    lotQty:r.lotQty||1, qty:1, img:r.img||'', itemId:'', orderNum:r.orderNum||'',
    seller:r.seller||'', type:r.type||'', player:r.player||'', year:r.year||'',
    brand:r.brand||'', set:r.set||'', comp:r.comp||'', variation:r.variation||'',
    serial:r.serial||'', grade:r.grade||'', is_auto:!!r.is_auto, is_rc:!!r.is_rc,
    is_lot:!!r.is_lot, notes:'',
  });
  _importRows[i]._confirmed = true;
  document.getElementById('import-results').innerHTML = renderImportResults();
  toast(`Added: ${r.name.slice(0,40)}…`);
  render();
}

function confirmAllImport() {
  _importRows.forEach((_,i) => { if(!_importRows[i]._confirmed) confirmImportRow(i); });
}

// ─────────────────────────────────────────────
// LISTING BUILDER
// ─────────────────────────────────────────────
const listingCache={};
async function buildListing(pid){
  const p=getP(pid);
  if(listingCache[pid]){showListingResult(pid,listingCache[pid]);return;}
  openPanel(`
    <div class="pn-head"><div><div class="pn-title">Building Listing…</div><div class="pn-meta">${esc(p.name)}</div></div>
    <button class="pn-close" onclick="closePanel()">✕</button></div>
    <div class="pn-body" style="text-align:center;padding-top:50px">
      <div class="spin" style="width:22px;height:22px;margin:0 auto 12px"></div>
      <div style="font-size:12px;font-family:var(--mono);color:var(--dim)">Writing your eBay listing…</div>
    </div>`);
  const prompt=`Professional eBay listing for this trading card:
CARD: ${p.name}
PLAYER: ${p.player||''} | YEAR: ${p.year||''} | SET: ${p.set||''} | VARIATION: ${p.variation||'base'}
SERIAL: ${p.serial?'/'+p.serial:'not serialized'} | GRADE: ${p.grade||'raw'} | AUTO: ${p.is_auto?'yes':'no'} | RC: ${p.is_rc?'yes':'no'}
TYPE: ${p.type}
Write: 1) TITLE (80 chars max, keyword-rich) 2) DESCRIPTION (4-6 sentences, NM condition unless graded) 3) SUGGESTED PRICE (auction start + BIN) 4) ITEM SPECIFICS (key:value list). Plain text, clear headers.`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    if(!res.ok)throw new Error('API '+res.status);
    const data=await res.json();
    const text=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    listingCache[pid]=text;showListingResult(pid,text);
  }catch(e){
    openPanel(`<div class="pn-head"><div><div class="pn-title">${esc(p.name)}</div></div><button class="pn-close" onclick="closePanel()">✕</button></div>
      <div class="pn-body"><div class="alert err">Failed: ${esc(e.message)}</div></div>`);
  }
}
function showListingResult(pid,text){
  const p=getP(pid);
  openPanel(`
    <div class="pn-head">
      ${p.img?`<img class="pn-img" src="${esc(p.img)}" onerror="this.style.display='none'">`:`<div class="pn-img" style="display:flex;align-items:center;justify-content:center;font-size:32px">🃏</div>`}
      <div style="flex:1;min-width:0"><div class="pn-title">eBay Listing Draft</div><div class="pn-meta">${esc(p.name)}</div></div>
      <button class="pn-close" onclick="closePanel()">✕</button>
    </div>
    <div class="pn-body">
      <div class="listing-out">${esc(text)}</div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn pri" onclick="navigator.clipboard.writeText(${JSON.stringify(text)}).then(()=>toast('Copied!'))">📋 Copy</button>
        <button class="btn ghost sm" onclick="delete listingCache['${pid}'];buildListing('${pid}')">↻ Regenerate</button>
      </div>
    </div>`);
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
render();
initApiKeyField();
</script></body></html>
